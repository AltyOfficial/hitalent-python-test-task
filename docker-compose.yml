version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: mydigitalvault_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    env_file:
      - ./environment/.env
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ./docker/django/Dockerfile
    container_name: web
    command: poetry run python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - ./environment/.env
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data: